<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculadora de Stacks - Minecraft</title>
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
	<div>
		<img src="../static/images/Title.png" 
			 th:src="@{/images/Title.png}" 
			 alt="Minecraft Stack Calculator Logo"
			 class="main-logo">
	</div>

	<div class="form-container">
		<form th:action="@{/calculate}" method="post">
			<div class="form-group">
				<label for="blocks">Cantidad de items:</label>
				<input
				type="number"
				id="blocks"
				name="blocks"
				min="0"
				required
				placeholder=" "
				th:value="${blocks}">
			</div>
			
			<div class="form-group">
				<label for="itemType">Tipo de item:</label>
				<select id="itemType" name="itemType">
					<option value="default" th:selected="${itemType == null or itemType == 'default'}">Blocks [64]</option>
					<option value="special" th:selected="${itemType == 'special'}">Specials [16]</option>
				</select>
			</div>
			
			<button type="submit" class="mc-button">Calculate</button>
		</form>
	</div>
	
	<div class="results-box" th:if="${result != null}">
    
		<h2>CALCULATE YOUR ITEM STACKS</h2>
		
		<div class="data-group">
			<p>Total de ítems: <span th:text="${result.totalItems()}">0</span></p>
			<p>Tamaño de stack: <span th:text="${result.stackSize()}">64</span></p>
			<p>Stacks Completos: <span th:text="${result.stacks()}">0</span></p>
			<p>Items Sueltos: <span th:text="${result.remainingItems()}">0</span></p>
			<p>Shulker box full: <span th:text="${result.fullShulkerBoxes()}">0</span></p>
			<p>Cofres dobles completos: <span th:text="${result.fullDoubleChests()}">0</span></p>
		</div>
	</div>

	<footer class="site-footer">
		<div class="footer-container">
			<div class="footer-column brand info">
				<h3>Minecraft Stack Calculator</h3>
				<p>Not affilited with Mojand Studios.</p>
				<p class="copyright">© 2026 Calculator Project.</p>
			</div>

			<div class="footer-column">
				<h4>Recursos</h4>
				<ul>
					<li><a href="#">Guias de Stacks</a></li>
					<li><a href="#">Wiki del juego</a></li>
				</ul>
			</div>-->

			<div class="footer-column">
				<h4>Acerca de</h4>
				<ul>
					<li><a href="#">Contacto</a></li>
					<li><a href="#">Privacidad</a></li>
				</ul>
			</div>

		</div>
	</footer>
</body>
</html>
