<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stacks Calculator - Minecraft</title>
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
	<div>
		<img src="../static/images/Title.png" 
			 th:src="@{/images/Title.png}" 
			 alt="Minecraft Stack Calculator Logo"
			 class="main-logo">
	</div>

	<div th:if="${errorMessage != null}" class="mc-error-box">
		<span class="error-icon">⚠</span>
		<p th:text="${errorMessage}">Mensaje de error por defecto</p>
	</div>

	<div class="form-container">
		<form th:action="@{/result}" method="post">
			<div class="form-group">
				<label for="blocks">Number of items:</label>
				<input
				type="number"
				id="blocks"
				name="blocks"
				min="0"
				required
				placeholder="0"
				th:value="${totalItems != null ? totalItems : ''}">
			</div>
			
			<div class="form-group">
				<label for="itemType">Item type:</label>
				<select id="itemType" name="itemType">
					<option value="default" th:selected="${itemType == null or itemType == 'default'}">Blocks [64]</option>
					<option value="special" th:selected="${itemType == 'special'}">Specials [16]</option>
				</select>
			</div>
			
			<button type="submit" class="mc-button">Calculate</button>
		</form>
	</div>
	
	<div class="results-box">
		<h2>CALCULATE YOUR ITEM STACKS</h2>
		
		<p>Total items: <strong th:text="${totalItems != null ? #numbers.formatInteger(totalItems, 1, 'POINT') : '0'}">0</strong></p>
		
		<th:block th:if="${result != null}">
			<p>Stacks : <span th:text="${#numbers.formatInteger(result.stacks, 1, 'POINT')}">0</span></p>
			<p>Remaining items: <span th:text="${#numbers.formatInteger(result.remainingItems, 1, 'POINT')}">0</span></p>
		</th:block>
		
		<th:block th:if="${result == null}">
			<p>Stacks : <span>0</span></p>
			<p>Remaining items: <span>0</span></p>
		</th:block>
    
		<div class="inventory-status">
			
			<div class="inventory-slot-row">
				<div class="mc-slot">
					<img src="/images/shulker_icon.png" class="slot-icon" alt="Shulker">
				</div>
				<span class="slot-text">x <strong th:text="${shulkerCount != null ? #numbers.formatInteger(shulkerCount, 1, 'POINT') : '0'}">0</strong> Shulker Boxes</span>
			</div>

			<div class="inventory-slot-row">
				<div class="mc-slot">
					<img src="/images/doublechest2.png" class="slot-icon" alt="Cofre">
				</div>
				<span class="slot-text">x <strong th:text="${chestCount != null ? #numbers.formatInteger(chestCount, 1, 'POINT') : '0'}">0</strong> Double Chests</span>
			</div>

		</div>
	</div>

	<footer class="site-footer">
		<div class="footer-container">
			<div class="footer-column brand info">
				<h3>Minecraft Stack Calculator</h3>
				<p>Not affilited with Mojand Studios.</p>
				<p class="copyright">© 2026 Calculator Project.</p>
			</div>

			<div class="footer-column">
				<h4>About us</h4>
				<ul>
					<li><a href="https://github.com/cupedeleted" target="_blank">Contact</a></li>
				</ul>
			</div>
		</div>
	</footer>
</body>
</html>
