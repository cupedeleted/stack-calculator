<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculadora de Stacks - Minecraft</title>
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
	<div>
		<img src="../static/images/Title.png" 
			 th:src="@{/images/Title.png}" 
			 alt="Minecraft Stack Calculator Logo"
			 class="main-logo">
	</div>

	<div class="form-container">
		<form th:action="@{/calculate}" method="post">
			<div class="form-group">
				<label for="blocks">Number of items:</label>
				<input
				type="number"
				id="blocks"
				name="blocks"
				min="0"
				required
				placeholder=" "
				th:value="${blocks}">
			</div>
			
			<div class="form-group">
				<label for="itemType">Item type:</label>
				<select id="itemType" name="itemType">
					<option value="default" th:selected="${itemType == null or itemType == 'default'}">Blocks [64]</option>
					<option value="special" th:selected="${itemType == 'special'}">Specials [16]</option>
				</select>
			</div>
			
			<button type="submit" class="mc-button">Calculate</button>
		</form>
	</div>
	
	<div class="results-box">
		<h2>CALCULATE YOUR ITEM STACKS</h2>
		<p>Total items: <strong th:text="${totalItems}">0</strong></p>
		<p>Stacks : <span th:text="${result.stacks()}">0</span></p>
		<p>Half stack: <span th:text="${result.remainingItems()}">0</span></p>
    
    <div class="result-line">
        <span>Shulker boxes full: <strong th:text="${shulkerCount}">0</strong></span>
        <span th:if="${shulkerCount > 0}">
            <img th:each="i : ${#numbers.sequence(1, shulkerCount)}"
                 src="/images/shulker_icon.png" 
                 class="asset-icon" alt="Shulker">
        </span>
    </div>

    <div class="result-line">
        <span>Double chest full: <strong th:text="${chestCount}">0</strong></span>
        <span th:if="${chestCount > 0}">
            <img th:each="i : ${#numbers.sequence(1, chestCount)}" 
                 src="/images/chest_icon.png" 
                 class="asset-icon" alt="Cofre">
        </span>
    </div>
	</div>

	<footer class="site-footer">
		<div class="footer-container">
			<div class="footer-column brand info">
				<h3>Minecraft Stack Calculator</h3>
				<p>Not affilited with Mojand Studios.</p>
				<p class="copyright">© 2026 Calculator Project.</p>
			</div>

			<div class="footer-column">
				<h4>About</h4>
				<ul>
					<li><a href="#">Contact</a></li>
					<li><a href="#">Privacity</a></li>
				</ul>
			</div>

		</div>
	</footer>
</body>
</html>
